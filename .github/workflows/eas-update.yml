name: EAS Update

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  update:
    name: Publish EAS Update
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Check Expo token
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error::EXPO_TOKEN secret is missing. Create an Expo access token and add it to Settings -> Secrets and variables -> Actions -> Repository secrets."
            echo "Open https://expo.dev/accounts/[account]/settings/access-tokens, create a token, then save it in GitHub as EXPO_TOKEN."
            exit 1
          fi

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish update
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas update --branch production --message "${{ github.sha }}" --non-interactive
